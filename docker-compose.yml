services:
  frontend:
    env_file:
      - .env.local
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_URL: http://audio-ui.dev.seanfield.org
        NEXT_PUBLIC_API_BASE_URL: http://audio-ui.dev.seanfield.org/api/v1
        NEXT_PUBLIC_API_URL: http://audio-ui.dev.seanfield.org
        NEXT_PUBLIC_AUTH_URL: http://auth.dev.seanfield.org
        NEXT_PUBLIC_AUTH_CLIENT_ID: app_a7cc084e415a7be496f89fa8f87c24bd
    ports:
      - "3002:3000"
    restart: unless-stopped
    networks:
      - ai-audio-network

networks:
  ai-audio-network:
    external: true

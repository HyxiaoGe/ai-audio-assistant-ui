services:
  frontend:
    env_file:
      - .env.local
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_URL: http://192.168.1.10:3002
        NEXT_PUBLIC_API_BASE_URL: http://192.168.1.10:8088/api/v1
        NEXT_PUBLIC_AUTH_URL: http://192.168.1.10:8100
        NEXT_PUBLIC_AUTH_CLIENT_ID: ${AUTH_CLIENT_ID:-}
    ports:
      - "3002:3000"
    restart: unless-stopped
    networks:
      - ai-audio-network

networks:
  ai-audio-network:
    external: true

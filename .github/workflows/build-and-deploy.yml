name: AI Audio UI Build & Deploy

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ai-audio-ui-build-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on Windows runner
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    outputs:
      started_at: ${{ steps.pipeline_start.outputs.started_at }}
      runner_name: ${{ steps.pipeline_start.outputs.runner_name }}
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      IMAGE_NAME: ghcr.io/hyxiaoge/ai-audio-assistant-ui
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_AUTH_URL: ${{ vars.NEXT_PUBLIC_AUTH_URL }}
      NEXT_PUBLIC_AUTH_CLIENT_ID: ${{ vars.NEXT_PUBLIC_AUTH_CLIENT_ID }}
    defaults:
      run:
        shell: cmd

    steps:
      - name: Record pipeline start
        id: pipeline_start
        run: |
          for /f %%i in ('powershell -NoProfile -ExecutionPolicy Bypass -Command "[DateTimeOffset]::UtcNow.ToUnixTimeSeconds()"') do echo started_at=%%i>>%GITHUB_OUTPUT%
          echo runner_name=${{ runner.name }}>>%GITHUB_OUTPUT%

      - name: Push CI/CD active metric
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $environment = if ($env:GITHUB_REF_NAME -eq "master") { "dev" } else { "preview" }
          $branchKey = $env:GITHUB_REF_NAME -replace '[^A-Za-z0-9_.-]', '_'
          $now = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $metrics = @"
          # HELP cicd_pipeline_active Whether a CI/CD pipeline is currently active (1=true, 0=false).
          # TYPE cicd_pipeline_active gauge
          cicd_pipeline_active{project="ai-audio-assistant-ui",branch="$env:GITHUB_REF_NAME",environment="$environment",runner="${{ runner.name }}"} 1
          # HELP cicd_pipeline_active_timestamp_seconds Timestamp of the latest CI/CD active-state update.
          # TYPE cicd_pipeline_active_timestamp_seconds gauge
          cicd_pipeline_active_timestamp_seconds{project="ai-audio-assistant-ui",branch="$env:GITHUB_REF_NAME",environment="$environment",runner="${{ runner.name }}"} $now
          "@
          $body = (($metrics -replace "`r`n", "`n").Trim() + "`n")
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-WebRequest -UseBasicParsing -Method Post -Uri "http://192.168.1.10:9092/metrics/job/cicd_active/project_key/ai-audio-assistant-ui/branch_key/$branchKey/environment_key/$environment" -ContentType "text/plain; version=0.0.4" -Body $bytes

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Verify Docker access
        run: |
          docker version
          docker ps

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --cache "%RUNNER_TEMP%\npm-cache"

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Login to GHCR
        run: echo %GITHUB_TOKEN% | docker login ghcr.io -u %GITHUB_ACTOR% --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --build-arg NEXT_PUBLIC_APP_URL="%NEXT_PUBLIC_APP_URL%" --build-arg NEXT_PUBLIC_API_BASE_URL="%NEXT_PUBLIC_API_BASE_URL%" --build-arg NEXT_PUBLIC_API_URL="%NEXT_PUBLIC_API_URL%" --build-arg NEXT_PUBLIC_AUTH_URL="%NEXT_PUBLIC_AUTH_URL%" --build-arg NEXT_PUBLIC_AUTH_CLIENT_ID="%NEXT_PUBLIC_AUTH_CLIENT_ID%" -t "%IMAGE_NAME%:%GITHUB_SHA%" .

      - name: Push Docker image
        run: |
          docker push "%IMAGE_NAME%:%GITHUB_SHA%"

      - name: Cleanup local Docker artifacts
        if: always()
        run: |
          docker image rm "%IMAGE_NAME%:%GITHUB_SHA%" 2>NUL
          docker builder prune --filter "until=72h" -f

  deploy-dev:
    name: Deploy master on dev server
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10

    steps:
      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Login to GHCR
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart ai-audio-assistant-ui
        run: |
          cd ~/project/ai-audio-assistant-ui
          docker pull ghcr.io/hyxiaoge/ai-audio-assistant-ui:${{ github.sha }}
          cat > docker-compose.ai-audio-ui-ghcr.yml <<'EOF'
          services:
            ai-audio-assistant-ui:
              image: ghcr.io/hyxiaoge/ai-audio-assistant-ui:${{ github.sha }}
              container_name: ai-audio-assistant-ui
              restart: always
              ports:
                - "3002:3000"
              environment:
                - NODE_ENV=production
              deploy:
                resources:
                  limits:
                    memory: 128m
              networks:
                - ai-audio-network

          networks:
            ai-audio-network:
              external: true
          EOF
          # 兜底：清掉旧 compose project（ai-audio-assistant-ui-frontend-1）持有的容器，避免首次切换时端口冲突
          docker rm -f ai-audio-assistant-ui-frontend-1 2>/dev/null || true
          docker rm -f ai-audio-assistant-ui 2>/dev/null || true
          docker compose -f docker-compose.ai-audio-ui-ghcr.yml up -d

      - name: Cleanup old images
        if: always()
        run: |
          current="ghcr.io/hyxiaoge/ai-audio-assistant-ui:${{ github.sha }}"
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' ghcr.io/hyxiaoge/ai-audio-assistant-ui \
            | awk -v current="$current" '$1 != current {print $2}' \
            | sort -u \
            | xargs -r docker rmi || true

      - name: Push CI/CD metrics
        if: always()
        run: |
          bash ~/scripts/push-cicd-metrics.sh \
            ai-audio-assistant-ui \
            "${{ github.ref_name }}" \
            dev \
            "${{ job.status }}" \
            "${{ needs.build.outputs.started_at }}" \
            "ghcr.io/hyxiaoge/ai-audio-assistant-ui:${{ github.sha }}" \
            "${{ github.sha }}" \
            "${{ needs.build.outputs.runner_name }}" \
            ai-audio-assistant-ui \
            "${{ env.DEPLOY_START }}"

      - name: 通知飞书(部署结果)
        if: always()
        continue-on-error: true
        env:
          FEISHU_INFRA_WEBHOOK: ${{ secrets.FEISHU_INFRA_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$FEISHU_INFRA_WEBHOOK" ]; then
            echo "FEISHU_INFRA_WEBHOOK 未配置,跳过飞书通知"
            exit 0
          fi
          if [ "$JOB_STATUS" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          export TEXT="${EMOJI} 部署 ${{ github.repository }} @ ${{ github.ref_name }} (${GITHUB_SHA:0:7}) = ${JOB_STATUS}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          [UptimeKuma keyword]"
          PAYLOAD="$(python3 -c 'import json,os; print(json.dumps({"msg_type":"text","content":{"text":os.environ["TEXT"]}}))')"
          curl -s -X POST "$FEISHU_INFRA_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"
